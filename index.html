<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>背書助手 V2.6 - 穩定換句版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #F0F3F5; margin: 0; padding: 20px; text-align: center; }
        .line { font-size: 18pt; color: #BDC3C7; margin: 15px 0; height: 40px; }
        .current-line { 
            font-size: 22pt; font-weight: bold; color: #2980B9; 
            border: 5px solid #3498DB; padding: 30px 10px; border-radius: 20px;
            background-color: white; min-height: 100px; display: flex; align-items: center; justify-content: center;
        }
        .status-success { background-color: #27AE60 !important; color: white !important; border-color: #2ECC71 !important; }
        .btn { width: 100%; height: 90px; font-size: 24pt; font-weight: bold; border: none; border-radius: 20px; color: white; margin-top: 30px; cursor: pointer; }
        #btn-start { background-color: #3498DB; box-shadow: 0 6px #2980B9; }
        #btn-stop { background-color: #E74C3C; box-shadow: 0 6px #C0392B; display: none; }
        .info { font-size: 16pt; margin-top: 20px; color: #7F8C8D; background: #e8ecef; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="line-0" class="line"></div>
    <div id="line-1" class="line"></div>
    <div id="line-2" class="line current-line">點擊開始</div>
    <div id="line-3" class="line"></div>
    <div id="line-4" class="line"></div>

    <div class="info">
        <div id="msg">語音狀態：準備就緒</div>
        <div style="font-size: 20pt; color: #27AE60; font-weight: bold; margin-top: 10px;">匹配度：<span id="score">0</span>%</div>
    </div>

    <button id="btn-start" class="btn">開始背誦</button>
    <button id="btn-stop" class="btn">停止並結算</button>

<script>
    // 教材內容
    const data = [
        "欲護學處者，策勵當護心；",
        "若不護此心，不能護學處。",
        "身雖無病難，不能為他事；",
        "善哉此勤學，速達成佛道。"
    ];
    
    let currentIdx = 0;
    let isLocked = false;
    let recognition;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = true;
        recognition.interimResults = true;
    }

    function updateView() {
        for (let i = 0; i < 5; i++) {
            let idx = currentIdx - 2 + i;
            document.getElementById(`line-${i}`).innerText = data[idx] || "";
        }
    }

    recognition.onresult = (event) => {
        if (isLocked) return; // 換句保護鎖

        let result = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            result += event.results[i][0].transcript;
        }
        
        document.getElementById('msg').innerText = "辨識中：" + result;
        
        // 核心改進：只取中文字進行比對，排除掉所有的標點符號與空白
        const clean = (text) => text.replace(/[^\u4e00-\u9fa5]/g, "");
        let target = clean(data[currentIdx]);
        let currentVoice = clean(result);
        
        // 匹配度算法
        let matchCount = 0;
        for (let char of target) {
            if (currentVoice.includes(char)) matchCount++;
        }
        let score = target.length > 0 ? Math.floor((matchCount / target.length) * 100) : 0;
        document.getElementById('score').innerText = score;

        // 通過門檻 70%
        if (score >= 70) {
            isLocked = true; // 啟動保護鎖，防止重複判定
            document.getElementById('line-2').classList.add('status-success');
            if (navigator.vibrate) navigator.vibrate(80); 
            
            // 延遲 800ms 後換下一句，清空語音快取
            setTimeout(() => {
                currentIdx++;
                document.getElementById('line-2').classList.remove('status-success');
                if (currentIdx < data.length) {
                    updateView();
                    document.getElementById('score').innerText = "0";
                    document.getElementById('msg').innerText = "請繼續背下一句...";
                    isLocked = false; // 解鎖
                } else {
                    alert("背誦圓滿完成！");
                    stopApp();
                }
            }, 800); 
        }
    };

    recognition.onerror = (event) => {
        document.getElementById('msg').innerText = "錯誤：" + event.error;
    };

    function stopApp() {
        recognition.stop();
        document.getElementById('btn-start').style.display = "block";
        document.getElementById('btn-stop').style.display = "none";
        isLocked = false;
    }

    document.getElementById('btn-start').onclick = () => {
        currentIdx = 0;
        updateView();
        recognition.start();
        document.getElementById('btn-start').style.display = "none";
        document.getElementById('btn-stop').style.display = "block";
    };

    document.getElementById('btn-stop').onclick = stopApp;
    updateView();
</script>
</body>
</html>
