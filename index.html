<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>背書助手 極速修復版</title>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root { --bg: #FAF9F6; --navy: #34495E; --gold: #D4AF37; --green: #679267; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; overflow: hidden; color: var(--navy); }
        .top-bar { display: flex; padding: 10px; gap: 10px; background: white; }
        select { flex: 1; font-size: 1.1rem; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .display { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .line { font-size: 2rem; font-weight: bold; margin: 10px 0; opacity: 0.2; text-align: center; width: 90%; transition: 0.3s; }
        .active { opacity: 1; color: var(--gold); background: #EBF5FB; border-radius: 12px; padding: 15px 5px; }
        
        /* 下載控制 */
        .loading-box { width: 85%; text-align: center; }
        .progress-container { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        #prog-bar { width: 0%; height: 100%; background: var(--gold); transition: width 0.3s; }
        #status-log { font-size: 0.8rem; color: #7f8c8d; height: 40px; }

        .bottom { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; box-sizing: border-box; }
        .btn { width: 100%; height: 75px; font-size: 1.8rem; font-weight: bold; border: none; border-radius: 15px; background: #BDC3C7; color: white; }
        .btn.ready { background: var(--green); color: white; }
    </style>
</head>
<body>

<div class="top-bar">
    <select id="scriptSel"><option>心經</option></select>
    <select id="micSel"><option>預設麥克風</option></select>
</div>

<div class="display">
    <div class="line" id="l-prev"></div>
    <div class="line active" id="l-curr">請檢查連線...</div>
    <div class="line" id="l-next"></div>
    
    <div class="loading-box">
        <div class="progress-container"><div id="prog-bar"></div></div>
        <div id="status-log">正在確認 HTTPS 安全環境...</div>
    </div>
</div>

<div class="bottom">
    <button class="btn" id="mainBtn" disabled>初始化中</button>
</div>

<script type="module">
    import { createModel } from "https://unpkg.com/vosk-browser@0.0.9/dist/vosk.js";

    const log = (msg) => { document.getElementById('status-log').innerText = msg; console.log(msg); };
    const bar = document.getElementById('prog-bar');
    const btn = document.getElementById('mainBtn');

    async function init() {
        // 檢查環境
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            log("❌ 錯誤：網頁必須在 HTTPS 環境下執行，否則無法啟動。");
            return;
        }

        try {
            log("📡 正在嘗試連線至 Vosk 模型伺服器...");
            
            // 模擬進度（因為原生 createModel 不支援進度回傳，我們用偽進度讓使用者知道沒當掉）
            let p = 0;
            const timer = setInterval(() => {
                if (p < 95) { p += 1; bar.style.width = p + "%"; log(`載入模型中... ${p}%`); }
            }, 300);

            // 執行下載與初始化
            const model = await createModel("https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.tar.gz");
            
            clearInterval(timer);
            bar.style.width = "100%";
            log("✅ 模型加載完畢！可以開始背誦。");
            
            document.getElementById('l-curr').innerText = "點擊下方按鈕開始";
            btn.disabled = false;
            btn.innerText = "開始背誦";
            btn.classList.add('ready');

        } catch (e) {
            log("❌ 當掉或出錯：" + e.message);
            document.getElementById('l-curr').innerText = "載入失敗";
        }
    }

    init();
</script>
</body>
</html>
