<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>背書助手 V2.5 - 強化收音版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #F0F3F5; margin: 0; padding: 20px; text-align: center; }
        .line { font-size: 18pt; color: #BDC3C7; margin: 15px 0; height: 40px; }
        .current-line { 
            font-size: 22pt; font-weight: bold; color: #2980B9; 
            border: 5px solid #3498DB; padding: 30px 10px; border-radius: 20px;
            background-color: white; min-height: 100px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .status-success { background-color: #27AE60 !important; color: white !important; border-color: #2ECC71 !important; }
        .status-error { background-color: #E74C3C !important; color: white !important; border-color: #C0392B !important; }
        .btn {
            width: 100%; height: 90px; font-size: 24pt; font-weight: bold; border: none; 
            border-radius: 20px; color: white; margin-top: 30px; cursor: pointer;
        }
        #btn-start { background-color: #3498DB; box-shadow: 0 6px #2980B9; }
        #btn-stop { background-color: #E74C3C; box-shadow: 0 6px #C0392B; display: none; }
        .info { font-size: 16pt; margin-top: 20px; color: #7F8C8D; background: #e8ecef; padding: 10px; border-radius: 10px; }
        #msg { color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>
    <div id="line-0" class="line"></div>
    <div id="line-1" class="line"></div>
    <div id="line-2" class="line current-line">點擊按鈕啟動麥克風</div>
    <div id="line-3" class="line"></div>
    <div id="line-4" class="line"></div>

    <div class="info">
        <div id="msg">語音狀態：準備就緒</div>
        <div style="font-size: 20pt; color: #27AE60; font-weight: bold; margin-top: 10px;">
            匹配度：<span id="score">0</span>%
        </div>
    </div>

    <button id="btn-start" class="btn">開始背誦</button>
    <button id="btn-stop" class="btn">停止結算</button>

<script>
    // 您的教材資料
    const data = [
        "欲護學處者，策勵當護心；",
        "若不護此心，不能護學處。",
        "身雖無病難，不能為他事；",
        "善哉此勤學，速達成佛道。"
    ];
    
    let currentIdx = 0;
    let isLocked = false;
    let recognition;

    // 檢查瀏覽器支援度
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("您的手機瀏覽器不支援語音辨識，請改用 Chrome 瀏覽器。");
    } else {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = true;
        recognition.interimResults = true;
    }

    function updateView() {
        for (let i = 0; i < 5; i++) {
            let idx = currentIdx - 2 + i;
            document.getElementById(`line-${i}`).innerText = data[idx] || "";
        }
    }

    // 當收音有結果時
    recognition.onresult = (event) => {
        if (isLocked) return;
        let result = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            result += event.results[i][0].transcript;
        }
        
        document.getElementById('msg').innerText = "聽到了：" + result;
        
        let target = data[currentIdx].replace(/[^\u4e00-\u9fa5]/g, "");
        let cleanResult = result.replace(/[^\u4e00-\u9fa5]/g, "");
        
        // 匹配算法
        let match = 0;
        for (let char of cleanResult) {
            if (target.includes(char)) match++;
        }
        let score = Math.floor((match / target.length) * 100);
        document.getElementById('score').innerText = score;

        // 通過判定 (70分)
        if (score >= 70) {
            isLocked = true;
            document.getElementById('line-2').classList.add('status-success');
            if (navigator.vibrate) navigator.vibrate(100); 
            
            setTimeout(() => {
                currentIdx++;
                document.getElementById('line-2').classList.remove('status-success');
                if (currentIdx < data.length) {
                    updateView();
                    document.getElementById('score').innerText = "0";
                    isLocked = false;
                } else {
                    alert("背誦完成！");
                    stopApp();
                }
            }, 800); 
        }
    };

    // 錯誤偵測邏輯
    recognition.onerror = (event) => {
        let errorMsg = "語音錯誤：" + event.error;
        if (event.error === 'not-allowed') {
            errorMsg = "權限錯誤：請點擊網址旁的「鎖頭」圖示，開啟麥克風權限。";
        } else if (event.error === 'network') {
            errorMsg = "網路錯誤：請確認手機有連網（或連 Wi-Fi）。";
        }
        document.getElementById('msg').innerText = errorMsg;
        console.error(event.error);
    };

    recognition.onstart = () => {
        document.getElementById('msg').innerText = "正在收音中...請開始說話";
    };

    function stopApp() {
        recognition.stop();
        document.getElementById('btn-start').style.display = "block";
        document.getElementById('btn-stop').style.display = "none";
        document.getElementById('msg').innerText = "語音已停止";
        isLocked = false;
    }

    document.getElementById('btn-start').onclick = () => {
        currentIdx = 0;
        updateView();
        try {
            recognition.start();
            document.getElementById('btn-start').style.display = "none";
            document.getElementById('btn-stop').style.display = "block";
        } catch (e) {
            console.log("Recognition already started");
        }
    };

    document.getElementById('btn-stop').onclick = stopApp;
    updateView();
</script>
</body>
</html>
